<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<button id="themeToggle">🌙</button>
<script>
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    toggleBtn.innerText = "☀️";
}

toggleBtn.onclick = () => {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        toggleBtn.innerText = "☀️";
    } else {
        localStorage.setItem("theme", "light");
        toggleBtn.innerText = "🌙";
    }
};
</script>


<h1>💰Master₹</h1>
<P id="finance">A smart way to manage expenses</P>

<div class="form">
    <h2>Add Transaction</h2>

    <input id="category" placeholder="Category (Food, Salary...)" required>
    <input id="amount" type="number" placeholder="Amount ₹" required>

    <select id="type">
        <option>Expense</option>
        <option>Income</option>
    </select>

    <input id="limit" type="number" placeholder="Set Monthly Limit ₹">
    <button   onclick="setLimit()" id="buttonlimit" >Set Limit</button>
    <br>
    

    <input id="date" type="date" required>

    <br>
    <button onclick="addData()">➕ Add Transaction</button>
</div>

<h2>📋 Transactions</h2>
<ul id="list"></ul>

<h2>🤖 AI Insights</h2>
<p id="insight"></p>
<p id="balance"></p>
<h2 id="Month">📅 Monthly Report</h2>
<div id="monthlyReport"></div>

<a href="/login">Logout</a>

<script>
async function addData() {
    const data = {
        category: document.getElementById("category").value,
        amount: document.getElementById("amount").value,
        type: document.getElementById("type").value,
        date: document.getElementById("date").value
    };

    if (!data.category || !data.amount || !data.date) {
        alert("All fields required ❌");
        return;
    }

    await fetch("/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    loadData();
}
function setLimit() {
    let limit = document.getElementById("limit").value;

    if (limit) {
        localStorage.setItem("expenseLimit", limit);
        alert("✅ Limit set successfully!");
    }
}

async function loadData() {
    const res = await fetch("/data");
    const data = await res.json();

    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(txn => {
    let li = document.createElement("li");

    li.innerHTML = `
        <div>
            <strong>${txn[2]}</strong><br>
            ${txn[1]} • ₹${txn[3]}
        </div>
        <button onclick="deleteTxn(${txn[0]})">❌</button>
    `;

    list.appendChild(li);
    });

    loadInsights();
    loadMonthly();
}

async function loadInsights() {
    const res = await fetch("/insights");
    const data = await res.json();

    document.getElementById("insight").innerText =
        `Income: ₹${data.income} | Expense: ₹${data.expense} | ${data.message}`;

    document.getElementById("balance").innerText =
        `Balance: ₹${data.balance}`;

    // 🚨 OVESPENDING ALERT
    if (data.expense > data.income) {
        showToast("⚠️ Overspending Alert!");

        let sound = document.getElementById("alertSound");
        sound.play().catch(() => {});
    }

    // 🎯 LIMIT ALERT
    let limit = localStorage.getItem("expenseLimit");

    if (limit && data.expense >= limit) {
        showToast("🚨 You reached your expense limit!");

        let sound = document.getElementById("alertSound");
        sound.play().catch(() => {});
    }
}
async function loadMonthly() {
    const res = await fetch("/monthly");
    const data = await res.json();

    let container = document.getElementById("monthlyReport");
    container.innerHTML = "";

    for (let month in data) {
        let m = data[month];

        let div = document.createElement("div");

        div.innerHTML = `
            <b>${month}</b><br>
            Income: ₹${m.income} |
            Expense: ₹${m.expense} |
            Balance: ₹${m.balance}
        `;

        // color logic
        if (m.balance >= 0) {
            div.style.color = "lightgreen";
        } else {
            div.style.color = "red";
        }

        container.appendChild(div);
    }
}
async function deleteTxn(id) {
    await fetch(`/delete/${id}`, {
        method: "DELETE"
    });

    loadData();
}

loadData();
</script>

</body>
</html>
